<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>寰宇 · 互动地球百科 · 方向A：深空 MOCKUP</title>
<style>
  :root{
    --glass-bg: rgba(10,18,40,0.55);
    --glass-border: rgba(255,255,255,0.08);
    --accent: #38bdf8;
    --accent-soft: #7dd3fc;
    --text-main: #e2f3ff;
    --text-dim: rgba(148,163,184,0.9);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{
    background:linear-gradient(160deg,#02040f 0%,#0a1228 100%);
    font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
    color:var(--text-main);
  }
  /* 星空点缀层 */
  .stars{position:fixed;inset:0;pointer-events:none;background-image:
    radial-gradient(1.5px 1.5px at 12% 22%,rgba(255,255,255,.7),transparent 60%),
    radial-gradient(1px 1px at 72% 14%,rgba(255,255,255,.5),transparent 60%),
    radial-gradient(1px 1px at 30% 78%,rgba(255,255,255,.4),transparent 60%),
    radial-gradient(1.5px 1.5px at 88% 60%,rgba(125,211,252,.5),transparent 60%),
    radial-gradient(1px 1px at 52% 40%,rgba(255,255,255,.35),transparent 60%),
    radial-gradient(1px 1px at 8% 55%,rgba(255,255,255,.3),transparent 60%),
    radial-gradient(1.5px 1.5px at 60% 88%,rgba(255,255,255,.45),transparent 60%),
    radial-gradient(1px 1px at 40% 8%,rgba(125,211,252,.4),transparent 60%);
  }
  #globe{position:fixed;inset:0;cursor:grab}
  /* 品牌区 */
  .brand{position:fixed;top:22px;left:28px;z-index:10;pointer-events:none}
  .brand h1{
    font-size:32px;font-weight:700;letter-spacing:.42em;color:#eaf6ff;
    text-shadow:0 0 26px rgba(56,189,248,.5);
  }
  .brand p{margin-top:6px;font-size:11px;letter-spacing:.22em;color:rgba(186,210,235,.6)}
  /* 面包屑 */
  .crumbs{
    position:fixed;top:24px;left:50%;transform:translateX(-50%);z-index:10;
    display:flex;align-items:center;gap:10px;padding:10px 20px;border-radius:999px;
    background:var(--glass-bg);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
    border:1px solid var(--glass-border);font-size:13px;white-space:nowrap;
  }
  .crumb{color:var(--text-dim)}
  .crumb.link{cursor:pointer}
  .crumb.link:hover{color:var(--accent-soft)}
  .crumb.cur{color:var(--text-main);font-weight:600}
  .sep{color:rgba(148,163,184,.4)}
  #resetBtn{
    margin-left:6px;padding:5px 14px;border-radius:999px;font-size:12px;cursor:pointer;
    color:#bae6fd;background:rgba(56,189,248,.12);border:1px solid rgba(125,211,252,.4);
    font-family:inherit;transition:background .2s;
  }
  #resetBtn:hover{background:rgba(56,189,248,.28)}
  /* 左下角悬停标签 */
  .hover-chip{
    position:fixed;left:28px;bottom:64px;z-index:10;padding:8px 16px;border-radius:10px;
    background:var(--glass-bg);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
    border:1px solid var(--glass-border);font-size:13px;pointer-events:none;
  }
  /* 右下角加载状态 */
  .status{
    position:fixed;right:24px;bottom:24px;z-index:20;display:flex;align-items:center;gap:10px;
    padding:9px 16px;border-radius:10px;font-size:12px;color:var(--text-dim);
    background:var(--glass-bg);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
    border:1px solid var(--glass-border);
  }
  .status[hidden]{display:none}   /* display:flex 会覆盖 [hidden]，需显式还原 */
  .spinner{
    width:13px;height:13px;border-radius:50%;flex:none;
    border:2px solid rgba(125,211,252,.25);border-top-color:var(--accent-soft);
    animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  /* 右侧信息面板（玻璃拟态） */
  #panel{
    position:fixed;top:88px;right:24px;bottom:80px;width:380px;z-index:15;
    background:var(--glass-bg);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
    border:1px solid var(--glass-border);border-radius:24px;padding:28px;
    overflow-y:auto;transform:translateX(440px);transition:transform .3s ease;
  }
  #panel.open{transform:translateX(0)}
  #panel::-webkit-scrollbar{width:4px}
  #panel::-webkit-scrollbar-thumb{background:rgba(125,211,252,.25);border-radius:2px}
  .kicker{font-size:11px;letter-spacing:.22em;color:var(--accent-soft);opacity:.85}
  .title{font-size:26px;font-weight:700;letter-spacing:.06em;margin:8px 0 4px}
  .sub{font-size:13px;color:var(--text-dim)}
  .thumb{width:100%;border-radius:14px;margin-top:16px;max-height:190px;object-fit:cover;display:block}
  .extract{
    margin-top:14px;font-size:14px;line-height:1.7;color:rgba(226,232,240,.92);
    display:-webkit-box;-webkit-line-clamp:8;-webkit-box-orient:vertical;overflow:hidden;
  }
  .wikilink{display:inline-block;margin-top:12px;font-size:13px;color:var(--accent-soft);text-decoration:none}
  .wikilink:hover{text-decoration:underline}
  .miss{margin-top:16px;font-size:13px;color:var(--text-dim)}
  .divider{height:1px;background:rgba(255,255,255,.08);margin:20px 0}
  .hint{font-size:13px;color:var(--text-dim);line-height:1.6}
  .demo-note{font-size:12px;color:#fde68a;line-height:1.7}
  .backbtn{
    width:100%;padding:11px;border-radius:12px;font-size:13px;cursor:pointer;font-family:inherit;
    color:#bae6fd;background:rgba(56,189,248,.1);border:1px solid rgba(125,211,252,.35);
    transition:background .2s;
  }
  .backbtn:hover{background:rgba(56,189,248,.25)}
  /* 骨架屏 */
  .skwrap{margin-top:18px}
  .sk{
    height:14px;border-radius:7px;margin-bottom:11px;
    background:linear-gradient(90deg,rgba(255,255,255,.06),rgba(255,255,255,.15),rgba(255,255,255,.06));
    background-size:200% 100%;animation:shimmer 1.2s infinite;
  }
  @keyframes shimmer{from{background-position:200% 0}to{background-position:-200% 0}}
  /* 页脚 */
  .foot{
    position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:10;
    font-size:11px;letter-spacing:.1em;color:rgba(148,163,184,.5);pointer-events:none;
  }
</style>
</head>
<body>
<div class="stars"></div>
<div id="globe"></div>

<header class="brand">
  <h1>寰宇</h1>
  <p>互动地球百科 · 方向A：深空 · MOCKUP</p>
</header>

<nav class="crumbs" id="crumbs"></nav>
<div class="hover-chip" id="hoverChip" hidden></div>
<div class="status" id="status" hidden><span class="spinner"></span><span id="statusText"></span></div>
<aside id="panel"><div id="panelBody"></div></aside>
<footer class="foot">实验原型 · 数据：Wikipedia / geoBoundaries / Natural Earth</footer>

<script src="https://cdn.jsdelivr.net/npm/globe.gl@2"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
<script>
/* ====================== 常量与全局状态 ====================== */
// 演示国家表：仅这些国家开放省级（ADM1）下钻
var DEMO = {
  156:{iso3:'CHN',zh:'中国'}, 840:{iso3:'USA',zh:'美国'}, 76:{iso3:'BRA',zh:'巴西'},
  36:{iso3:'AUS',zh:'澳大利亚'}, 392:{iso3:'JPN',zh:'日本'}, 643:{iso3:'RUS',zh:'俄罗斯'},
  356:{iso3:'IND',zh:'印度'}, 276:{iso3:'DEU',zh:'德国'}, 250:{iso3:'FRA',zh:'法国'},
  124:{iso3:'CAN',zh:'加拿大'}
};
var DEMO_NOTE = '演示版：省级下钻仅开放 中国・美国・巴西・澳大利亚・日本・俄罗斯・印度・德国・法国・加拿大';
// ADM1 区块的青蓝同色系调色板（循环使用）
var REGION_PALETTE = [
  'rgba(34,160,220,0.30)','rgba(56,189,248,0.20)','rgba(14,116,178,0.34)',
  'rgba(94,210,255,0.18)','rgba(8,84,140,0.38)','rgba(125,211,252,0.14)'
];

var countries = [];        // 全部国家 GeoJSON features
var countriesById = {};    // numericId -> feature
var zhNames = {};          // numericId -> 已解析的中文名缓存
var adm1Cache = {};        // iso3 -> ADM1 features
var wikiCache = {};        // title -> wiki summary（含 miss=null）
var hoverD = null;         // 当前悬停 polygon
// 应用状态机：world（全球）/ country（国家）/ region（地区）
var state = { mode:'world', country:null, regions:null, regionIndex:-1, adm1Status:null };

var globeEl = document.getElementById('globe');
var panelEl = document.getElementById('panel');
var panelBody = document.getElementById('panelBody');
var statusEl = document.getElementById('status');
var statusText = document.getElementById('statusText');
var hoverChip = document.getElementById('hoverChip');

/* ====================== Globe 初始化 ====================== */
var globe = Globe()(globeEl)
  .width(window.innerWidth).height(window.innerHeight)
  .backgroundColor('rgba(0,0,0,0)')        // 透出 CSS 深空渐变背景
  .globeImageUrl(null)
  .showAtmosphere(true)
  .atmosphereColor('#67e8f9')
  .atmosphereAltitude(0.18)
  .showGraticules(true)
  .polygonsData([])
  .polygonsTransitionDuration(300)
  .onPolygonHover(onHover)
  .onPolygonClick(onClick);

var gMat = globe.globeMaterial();
gMat.color.set('#0b1a33');
if (gMat.emissive) gMat.emissive.set('#040b1c');
globe.pointOfView({ lat:20, lng:60, altitude:2.5 }, 0);

// 初始慢速自转，用户首次交互后关闭
var controls = globe.controls();
controls.autoRotate = true;
controls.autoRotateSpeed = 0.35;
function stopRotate(){ controls.autoRotate = false; }
globeEl.addEventListener('pointerdown', stopRotate, { once:true });
globeEl.addEventListener('wheel', stopRotate, { once:true, passive:true });
window.addEventListener('resize', function(){
  globe.width(window.innerWidth).height(window.innerHeight);
});

/* ====================== Polygon 样式访问器 ====================== */
function isSelectedCountry(d){
  return state.country && !state.regions && Number(d.id) === state.country.id;
}
function capColor(d){
  if (d.__isRegion){
    if (d === hoverD || d.__regionIndex === state.regionIndex) return 'rgba(125,211,252,0.55)';
    return REGION_PALETTE[d.__regionIndex % REGION_PALETTE.length];
  }
  if (state.mode !== 'world'){
    if (isSelectedCountry(d)) return 'rgba(56,189,248,0.35)';   // 非演示国家选中高亮
    return 'rgba(148,163,184,0.05)';                            // 其他国家调暗
  }
  return d === hoverD ? 'rgba(56,189,248,0.45)' : 'rgba(56,189,248,0.12)';
}
function strokeColor(d){
  if (d.__isRegion) return d.__regionIndex === state.regionIndex ? '#ffffff' : 'rgba(186,230,253,0.7)';
  if (state.mode !== 'world') return isSelectedCountry(d) ? '#38bdf8' : 'rgba(148,163,184,0.15)';
  return '#38bdf8';
}
function altitudeOf(d){
  // 近景视角下多边形要尽量贴地，过高会产生侧面遮挡与撕裂感
  if (d.__isRegion){
    if (d.__regionIndex === state.regionIndex) return 0.008;   // 选中地区略升
    return d === hoverD ? 0.006 : 0.002;
  }
  if (state.mode !== 'world') return isSelectedCountry(d) ? 0.004 : 0.002;
  return d === hoverD ? 0.02 : 0.006;
}
// 重新挂访问器以触发样式重算（globe.gl 惯用法）
function refreshStyles(){
  globe.polygonCapColor(function(d){ return capColor(d); })
       .polygonStrokeColor(function(d){ return strokeColor(d); })
       .polygonSideColor(function(){ return 'rgba(56,189,248,0.04)'; })
       .polygonAltitude(function(d){ return altitudeOf(d); });
}
// 按状态切换 polygonsData：国家态 = 其他国家 + 选中国家的 ADM1
function refreshData(){
  var data;
  if (state.mode !== 'world' && state.regions){
    data = countries.filter(function(f){ return Number(f.id) !== state.country.id; })
                    .concat(state.regions);
  } else data = countries;
  globe.polygonsData(data);
  refreshStyles();
}

/* ====================== 视角计算（bbox 中心 + 跨度估 altitude） ====================== */
function viewFor(feature){
  var minLat=90, maxLat=-90, minLng=180, maxLng=-180, minS=360, maxS=0;
  (function walk(c){
    if (typeof c[0] === 'number'){
      var lng=c[0], lat=c[1], s=lng<0 ? lng+360 : lng;  // 平移坐标，处理跨经度 180 的国家
      if (lat<minLat) minLat=lat; if (lat>maxLat) maxLat=lat;
      if (lng<minLng) minLng=lng; if (lng>maxLng) maxLng=lng;
      if (s<minS) minS=s; if (s>maxS) maxS=s;
    } else c.forEach(walk);
  })(feature.geometry.coordinates);
  var lngSpan=maxLng-minLng, cLng=(minLng+maxLng)/2;
  if (lngSpan>180 && (maxS-minS)<lngSpan){   // 俄/美等跨反子午线：用平移后 bbox
    lngSpan=maxS-minS; cLng=(minS+maxS)/2; if (cLng>180) cLng-=360;
  }
  var span=Math.max(maxLat-minLat, lngSpan);
  return { lat:(minLat+maxLat)/2, lng:cLng, alt:Math.min(1.8, Math.max(0.35, span/55)) };
}

/* ====================== 数据加载（均带兜底，不抛未捕获异常） ====================== */
async function loadWorld(){
  showStatus('加载世界地图…');
  try{
    var r = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
    if (!r.ok) throw new Error('http '+r.status);
    var topo = await r.json();
    countries = topojson.feature(topo, topo.objects.countries).features;
    countries.forEach(function(f){ countriesById[Number(f.id)] = f; });
    refreshData();
    hideStatus();
  }catch(e){ showStatus('世界地图加载失败，请检查网络后刷新'); }
}

// geoBoundaries 环绕方向不统一：球面填充需外环顺时针、内环逆时针，否则 cap 出现三角撕裂
function rewindRings(poly){
  return poly.map(function(ring, ri){
    var s = 0;
    for (var i = 0; i < ring.length - 1; i++) s += (ring[i+1][0] - ring[i][0]) * (ring[i+1][1] + ring[i][1]);
    var isCW = s > 0, wantCW = ri === 0;
    return isCW === wantCW ? ring : ring.slice().reverse();
  });
}
function rewindFeature(f){
  var g = f.geometry || {};
  if (g.type === 'Polygon') g.coordinates = rewindRings(g.coordinates);
  else if (g.type === 'MultiPolygon') g.coordinates = g.coordinates.map(rewindRings);
  return f;
}

async function loadADM1(iso3){
  if (adm1Cache[iso3]) return adm1Cache[iso3];
  try{
    var mr = await fetch('https://www.geoboundaries.org/api/current/gbOpen/'+iso3+'/ADM1/');
    if (!mr.ok) return null;
    var meta = await mr.json();
    var raw = meta.simplifiedGeometryGeoJSON;
    if (!raw) return null;
    var gj = null;
    // github raw → jsDelivr 镜像，保证 CORS；失败再退回原 URL
    var m = raw.match(/github\.com\/wmgeolab\/geoBoundaries\/raw\/([^/]+)\/(.+)/);
    if (m){
      try{
        var r1 = await fetch('https://media.githubusercontent.com/media/wmgeolab/geoBoundaries/'+m[1]+'/'+m[2]);
        if (r1.ok) gj = await r1.json();
      }catch(e1){}
    }
    if (!gj){
      var r2 = await fetch(raw);
      if (r2.ok) gj = await r2.json();
    }
    if (gj && gj.features && gj.features.length){
      gj.features.forEach(rewindFeature);
      adm1Cache[iso3]=gj.features; return gj.features;
    }
    return null;
  }catch(e){ return null; }
}

// 维基简介：zh → en 依次尝试，命中 zh 可拿中文显示名
var WIKI_SUFFIX_RE = /\s+(Province|Municipality|Autonomous Region|Special Administrative Region|Prefecture|Region|State|Territory|District|County|Department|Governorate|Oblast|Krai|Republic|Voivodeship)$/i;
var HAS_CJK_RE = /[一-鿿]/;

// zh 维基 action API：variant=zh-cn 输出简体标题+摘要+缩略图
async function zhSummary(title){
  try{
    var u = 'https://zh.wikipedia.org/w/api.php?action=query&format=json&origin=*'
          + '&prop=extracts|pageimages|info&inprop=url|varianttitles&exintro=1&explaintext=1&exsentences=5'
          + '&redirects=1&converttitles=1&piprop=thumbnail&pithumbsize=480&variant=zh-cn'
          + '&titles=' + encodeURIComponent(title);
    var r = await fetch(u);
    if (!r.ok) return null;
    var j = await r.json();
    var p = j.query && j.query.pages && Object.values(j.query.pages)[0];
    if (!p || p.missing !== undefined || !p.extract) return null;
    return { lang:'zh', title:(p.varianttitles && p.varianttitles['zh-cn']) || p.title, extract:p.extract,
             thumb:(p.thumbnail&&p.thumbnail.source)||null,
             url:p.fullurl||('https://zh.wikipedia.org/wiki/'+encodeURIComponent(p.title)) };
  }catch(e){ return null; }
}
// en 维基 REST summary（带 wikibase_item，用于桥接 zhwiki）
async function enSummary(title){
  try{
    var r = await fetch('https://en.wikipedia.org/api/rest_v1/page/summary/'
                        + encodeURIComponent(String(title).replace(/ /g,'_')));
    if (!r.ok) return null;
    var j = await r.json();
    if (!j || !j.extract) return null;
    return { lang:'en', title:j.title||title, extract:j.extract,
             thumb:(j.thumbnail&&j.thumbnail.source)||null,
             url:(j.content_urls&&j.content_urls.desktop&&j.content_urls.desktop.page)||null,
             qid:j.wikibase_item||null };
  }catch(e){ return null; }
}
// Wikidata：Q 号 → 中文维基条目名
async function qidZhTitle(qid){
  try{
    var r = await fetch('https://www.wikidata.org/w/api.php?action=wbgetentities&format=json&origin=*&props=sitelinks&sitefilter=zhwiki&ids='+qid);
    if (!r.ok) return null;
    var j = await r.json();
    var sl = j.entities && j.entities[qid] && j.entities[qid].sitelinks;
    return (sl && sl.zhwiki && sl.zhwiki.title) || null;
  }catch(e){ return null; }
}
// 统一链路：中文名→zh 直查；英文名→en summary 拿 Q 号→Wikidata 桥接 zhwiki→zh 简体摘要；zh 缺失退 en
async function fetchWiki(title){
  if (title in wikiCache) return wikiCache[title];
  var out = null;
  if (HAS_CJK_RE.test(String(title))){
    out = await zhSummary(title);
  } else {
    var en = await enSummary(title);
    if (!en){
      var stripped = String(title).replace(WIKI_SUFFIX_RE,'');
      if (stripped !== String(title)) en = await enSummary(stripped);
    }
    if (en && en.qid){
      var zt = await qidZhTitle(en.qid);
      if (zt) out = await zhSummary(zt);
    }
    if (!out) out = en;
  }
  wikiCache[title] = out;
  return out;
}

/* ====================== 交互处理（真实点击与 __mockup 复用同一函数） ====================== */
function onHover(d){
  hoverD = d || null;
  globeEl.style.cursor = d ? 'pointer' : 'grab';
  if (d){ hoverChip.hidden = false; hoverChip.textContent = displayName(d); }
  else hoverChip.hidden = true;
  refreshStyles();
}
function onClick(d){
  if (!d) return;
  if (d.__isRegion) selectRegion(d.__regionIndex);
  else selectCountry(d);
}
function displayName(d){
  if (d.__isRegion) return d.__zh || d.properties.shapeName;
  var id = Number(d.id);
  if (DEMO[id]) return DEMO[id].zh;
  return zhNames[id] || d.properties.name;
}

async function selectCountry(idOrFeat){
  var feat = (typeof idOrFeat === 'object') ? idOrFeat : countriesById[Number(idOrFeat)];
  if (!feat) return;
  stopRotate();
  hideStatus();
  var id = Number(feat.id), demo = DEMO[id] || null;
  var ctry = { id:id, feature:feat, demo:!!demo, iso3:demo&&demo.iso3,
               en:feat.properties.name, zh: demo ? demo.zh : (zhNames[id]||feat.properties.name),
               wiki:null, wikiState:'loading' };
  state = { mode:'country', country:ctry, regions:null, regionIndex:-1,
            adm1Status: demo ? 'loading' : null };
  // 相机飞向国家质心；近景下大气层会把画面洗白，暂时关闭
  globe.showAtmosphere(false);
  var v = viewFor(feat);
  globe.pointOfView({ lat:v.lat, lng:v.lng, altitude:v.alt }, 1200);
  refreshData(); updateBreadcrumb(); openPanel(); renderCountryPanel();
  // 演示国家：并行加载省级边界
  if (demo){
    showStatus('加载省级边界…');
    loadADM1(demo.iso3).then(function(feats){
      hideStatus();
      if (state.country !== ctry) return;       // 期间已切换，丢弃
      if (feats){
        feats.forEach(function(f,i){ f.__isRegion=true; f.__regionIndex=i; });
        state.regions = feats; state.adm1Status = 'ready';
        refreshData();
      } else state.adm1Status = 'error';
      if (state.mode === 'country') renderCountryPanel();
    });
  }
  // 维基简介（zh→en）
  var w = await fetchWiki(demo ? demo.zh : feat.properties.name);
  ctry.wiki = w; ctry.wikiState = 'done';
  if (w && w.lang === 'zh'){ ctry.zh = w.title; zhNames[id] = w.title; }
  if (state.country === ctry){
    updateBreadcrumb();
    if (state.mode === 'country') renderCountryPanel();
  }
}

async function selectRegion(index){
  if (!state.regions) return;
  var f = state.regions[index];
  if (!f) return;
  state.mode = 'region'; state.regionIndex = index;
  refreshStyles(); updateBreadcrumb(); openPanel();
  if (f.__wikiState === 'done'){ renderRegionPanel(); return; }
  f.__wikiState = 'loading';
  renderRegionPanel();
  var w = await fetchWiki(f.properties.shapeName);
  f.__wiki = w; f.__wikiState = 'done';
  if (w && w.lang === 'zh') f.__zh = w.title;
  if (state.mode === 'region' && state.regions && state.regions[state.regionIndex] === f){
    updateBreadcrumb(); renderRegionPanel();
  }
}

function backToCountry(){
  if (!state.country) return;
  state.mode = 'country'; state.regionIndex = -1;
  refreshStyles(); updateBreadcrumb(); renderCountryPanel();
}

function resetView(){
  state = { mode:'world', country:null, regions:null, regionIndex:-1, adm1Status:null };
  hideStatus(); closePanel(); updateBreadcrumb(); refreshData();
  globe.showAtmosphere(true);
  globe.pointOfView({ lat:20, lng:60, altitude:2.5 }, 1000);
}

/* ====================== UI 渲染 ====================== */
function esc(s){
  return String(s).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}
function showStatus(text){ statusEl.hidden = false; statusText.textContent = text; }
function hideStatus(){ statusEl.hidden = true; }
function openPanel(){ panelEl.classList.add('open'); }
function closePanel(){ panelEl.classList.remove('open'); }
function skeletonHtml(){
  return '<div class="skwrap"><div class="sk" style="width:92%"></div>'
       + '<div class="sk" style="width:100%"></div><div class="sk" style="width:68%"></div></div>';
}
function wikiBlockHtml(w, loading){
  if (loading) return skeletonHtml();
  if (!w) return '<p class="miss">未找到该条目的维基简介</p>';
  var h = '';
  if (w.thumb) h += '<img class="thumb" src="'+esc(w.thumb)+'" alt="">';
  h += '<p class="extract">'+esc(w.extract)+'</p>';
  if (w.url) h += '<a class="wikilink" href="'+esc(w.url)+'" target="_blank" rel="noopener">在维基百科查看 →</a>';
  return h;
}

function renderCountryPanel(){
  var c = state.country;
  if (!c) return;
  var html = '<p class="kicker">国家 · COUNTRY</p>'
           + '<h2 class="title">'+esc(c.zh)+'</h2>';
  if (c.zh !== c.en) html += '<p class="sub">'+esc(c.en)+'</p>';
  html += wikiBlockHtml(c.wiki, c.wikiState === 'loading');
  html += '<div class="divider"></div>';
  if (c.demo){
    if (state.adm1Status === 'loading')    html += '<p class="hint">正在加载省级边界…</p>';
    else if (state.adm1Status === 'error') html += '<p class="hint">省级边界加载失败，请稍后重试</p>';
    else                                   html += '<p class="hint">点击地图上的省 / 州查看简介</p>';
  } else {
    html += '<p class="demo-note">'+esc(DEMO_NOTE)+'</p>';
  }
  panelBody.innerHTML = html;
}

function renderRegionPanel(){
  var f = state.regions[state.regionIndex];
  var name = f.__zh || f.properties.shapeName;
  var html = '<p class="kicker">'+esc(state.country.zh)+' · 地区</p>'
           + '<h2 class="title">'+esc(name)+'</h2>';
  if (f.__zh && f.__zh !== f.properties.shapeName) html += '<p class="sub">'+esc(f.properties.shapeName)+'</p>';
  html += wikiBlockHtml(f.__wiki, f.__wikiState === 'loading');
  html += '<div class="divider"></div>';
  html += '<button class="backbtn" id="backBtn">← 返回 '+esc(state.country.zh)+'</button>';
  panelBody.innerHTML = html;
  document.getElementById('backBtn').onclick = backToCountry;
}

function updateBreadcrumb(){
  var c = document.getElementById('crumbs');
  c.innerHTML = '';
  function mk(text, cls, fn){
    var s = document.createElement('span');
    s.textContent = text; s.className = cls;
    if (fn){ s.classList.add('link'); s.onclick = fn; }
    c.appendChild(s);
  }
  mk('全球', 'crumb'+(state.mode==='world'?' cur':''), state.mode!=='world' ? resetView : null);
  if (state.country){
    mk('/', 'sep');
    mk(state.country.zh, 'crumb'+(state.mode==='country'?' cur':''),
       state.mode==='region' ? backToCountry : null);
  }
  if (state.mode === 'region'){
    var f = state.regions[state.regionIndex];
    mk('/', 'sep');
    mk(f.__zh || f.properties.shapeName, 'crumb cur', null);
  }
  if (state.mode !== 'world'){
    var b = document.createElement('button');
    b.id = 'resetBtn'; b.textContent = '⟲ 返回全球'; b.onclick = resetView;
    c.appendChild(b);
  }
}

/* ====================== 测试钩子（与真实点击同一处理函数） ====================== */
window.__mockup = {
  selectCountry: function(numericId){ return selectCountry(numericId); },
  selectRegion:  function(index){ return selectRegion(index); },
  reset:         function(){ return resetView(); }
};

/* ====================== 启动 ====================== */
updateBreadcrumb();
refreshStyles();
loadWorld();
</script>
</body>
</html>
